<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>简易论坛</title>
    <link rel="stylesheet" href="styles.css"> <!-- 假设后续有样式表来美化页面 -->
</head>

<body>
    <h1>简易论坛</h1>
    <!-- 显示帖子列表的区域 -->
    <div id="post-list">
    </div>
    <!-- 发布新帖的表单 -->
    <form id="post-form">
        <label for="title">标题：</label>
        <input type="text" id="title" placeholder="请输入帖子标题" required>
        <label for="content">内容：</label>
        <textarea id="content" placeholder="请输入帖子内容" required></textarea>
        <button type="submit">发布帖子</button>
    </form>
    <!-- 回复帖子的表单（初始隐藏，点击回复按钮时显示） -->
    <form id="reply-form" style="display: none;">
        <label for="reply-content">回复内容：</label>
        <textarea id="reply-content" placeholder="请输入回复内容" required></textarea>
        <button type="submit">回复帖子</button>
    </form>
    <script src="script.js"></script>
</body>

</html>
