<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GitHub 服务端论坛</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav>
        <ul>
            <li><a href="#">首页</a></li>
            <li><a href="#">分类</a></li>
            <li><a href="#">关于</a></li>
        </ul>
    </nav>
    <div class="posts" id="posts-list">
        <h2>帖子列表</h2>
        <ul id="post-items"></ul>
    </div>
    <form class="post-form" id="post-form">
        <label for="title">标题：</label>
        <input type="text" id="title" placeholder="请输入帖子标题">
        <label for="content">内容：</label>
        <textarea id="content" placeholder="请输入帖子内容"></textarea>
        <input type="submit" value="发布">
    </form>
    <script src="script.js"></script>
</body>

</html>
